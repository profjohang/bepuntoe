{% extends "base.html" %}

{% block content %}

<div class="card shadow-sm mb-4 border-0">
    <div class="card-body d-flex justify-content-between align-items-center">
        <div>
            <h4 class="mb-1 text-primary">Hola, <span id="display_name">Cargando...</span> 👋</h4>
            <p class="text-muted mb-0">
                <i class="fas fa-school me-1"></i> <span id="display_school">...</span> | 
                <i class="fas fa-graduation-cap me-1"></i> <span id="display_grade">...</span>
            </p>
        </div>
        <button class="btn btn-outline-primary btn-sm" data-bs-toggle="modal" data-bs-target="#editProfileModal">
            <i class="fas fa-pen"></i> Editar Perfil
        </button>
    </div>
</div>

<div class="modal fade" id="editProfileModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">Editar mis datos</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
                <form id="profileForm">
                    <div class="mb-3">
                        <label class="form-label">Nombre Completo</label>
                        <input type="text" class="form-control" id="edit_fullname">
                    </div>
                    <div class="row">
                        <div class="col-6 mb-3">
                            <label class="form-label">Edad</label>
                            <input type="number" class="form-control" id="edit_age">
                        </div>
                        <div class="col-6 mb-3">
                            <label class="form-label">Grado / Curso</label>
                            <input type="text" class="form-control" id="edit_grade">
                        </div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Colegio</label>
                        <input type="text" class="form-control" id="edit_school">
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                <button type="button" class="btn btn-primary" onclick="saveProfile()">Guardar Cambios</button>
            </div>
        </div>
    </div>
</div>

<div class="row mb-4 align-items-center">
    <div class="col">
        <h2 class="fw-bold text-dark">Mis Proyectos</h2>
        <p class="text-muted">Gestiona tus ideas de emprendimiento</p>
    </div>
    <div class="col-auto">
        <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#createProjectModal">
            + Nuevo Proyecto
        </button>
    </div>
</div>

<div class="row" id="projects-container">
    </div>

<div class="modal fade" id="createProjectModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">Nueva Idea</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <form id="createProjectForm">
                    <div class="mb-3">
                        <label class="form-label">Nombre</label>
                        <input type="text" class="form-control" id="new_title" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Descripción</label>
                        <textarea class="form-control" id="new_desc" rows="3" required></textarea>
                    </div>
                    <button type="submit" class="btn btn-primary w-100">Crear</button>
                </form>
            </div>
        </div>
    </div>
</div>

<div class="modal fade" id="editProjectModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">Editar Proyecto</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <form id="editProjectForm">
                    <input type="hidden" id="edit_project_id">
                    <div class="mb-3">
                        <label class="form-label">Nombre</label>
                        <input type="text" class="form-control" id="edit_title" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Descripción</label>
                        <textarea class="form-control" id="edit_desc" rows="3" required></textarea>
                    </div>
                    <button type="submit" class="btn btn-primary w-100">Guardar Cambios</button>
                </form>
            </div>
        </div>
    </div>
</div>

<script>
    const token = localStorage.getItem("access_token");
    if (!token) window.location.href = "/login";

    async function loadUserProfile() {
        const token = localStorage.getItem("access_token");
        if (!token) return; 

        try {
            const response = await fetch("/users/me", {
                headers: { "Authorization": `Bearer ${token}` }
            });
            
            if (response.ok) {
                const user = await response.json();
                
                // A. Rellenar la Tarjeta Principal
                document.getElementById("display_name").innerText = user.full_name || user.username;
                document.getElementById("display_school").innerText = user.school || "Sin colegio";
                document.getElementById("display_grade").innerText = user.grade || "Sin grado";

                // B. Rellenar el Formulario del Modal (para que cuando edites, ya tenga tus datos)
                document.getElementById("edit_fullname").value = user.full_name || "";
                document.getElementById("edit_age").value = user.age || "";
                document.getElementById("edit_school").value = user.school || "";
                document.getElementById("edit_grade").value = user.grade || "";
            }
        } catch (error) {
            console.error("Error cargando perfil:", error);
        }
    }

    async function saveProfile() {
    const token = localStorage.getItem("access_token");
    
    const data = {
        full_name: document.getElementById('edit_fullname').value,
        age: document.getElementById('edit_age').value,
        school: document.getElementById('edit_school').value,
        grade: document.getElementById('edit_grade').value
    };

    try {
        const response = await fetch("/users/me/profile", {
            method: "PUT",
            headers: {
                "Content-Type": "application/json",
                "Authorization": `Bearer ${token}`
            },
            body: JSON.stringify(data)
        });

        if (response.ok) {
            alert("✅ Perfil actualizado con éxito");
            location.reload(); // Recargamos para ver los cambios
        } else {
            alert("❌ Hubo un error al actualizar.");
        }
    } catch (error) {
        console.error(error);
        alert("⚠️ Error de conexión.");
    }
    }

    async function loadProjects() {
        const response = await fetch('/projects/', { headers: { 'Authorization': `Bearer ${token}` } });
        if (response.status === 401) window.location.href = "/login";
        
        const projects = await response.json();
        const container = document.getElementById('projects-container');
        container.innerHTML = '';

        projects.forEach(p => {
        container.innerHTML += `
        <div class="col-md-4 mb-4" id="project-card-${p.id}">
            <div class="card h-100 shadow-sm border-0">
                <div class="card-body">
                    <div class="d-flex justify-content-between align-items-start">
                        <h5 class="fw-bold">${p.title}</h5>
                        <div class="dropdown">
                            <button class="btn btn-sm btn-link text-muted" data-bs-toggle="dropdown">
                                <i class="fas fa-ellipsis-v"></i>
                            </button>
                            <ul class="dropdown-menu dropdown-menu-end">
                                <li>
                                    <a class="dropdown-item" href="#" onclick="openEditModal(${p.id}, '${p.title}', '${p.description}')">
                                        <i class="fas fa-edit me-2"></i>Editar
                                    </a>
                                </li>
                                <li>
                                    <a class="dropdown-item text-danger" href="#" onclick="deleteProject(${p.id}, '${p.title}')">
                                        <i class="fas fa-trash me-2"></i>Eliminar
                                    </a>
                                </li>
                            </ul>
                        </div>
                    </div>
                    <p class="text-muted small">${p.description}</p>
                    <div class="mt-3">
                        <a href="/project/view/${p.id}" class="btn btn-primary w-100">Abrir</a>                        
                    </div>
                </div>
            </div>
        </div>`;
        });
    }

    function openEditModal(id, title, desc) {
        document.getElementById('edit_project_id').value = id;
        document.getElementById('edit_title').value = title;
        document.getElementById('edit_desc').value = desc;
        new bootstrap.Modal(document.getElementById('editProjectModal')).show();
    }

    document.getElementById('editProjectForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const id = document.getElementById('edit_project_id').value;
        const res = await fetch(`/projects/${id}`, {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
            body: JSON.stringify({ title: document.getElementById('edit_title').value, description: document.getElementById('edit_desc').value })
        });
        if (res.ok) location.reload();
    });

    async function deleteProject(id, title) {
        if (confirm(`¿Borrar "${title}"?`) && confirm("¿Confirmas la eliminación definitiva?")) {
            const res = await fetch(`/projects/${id}`, { method: 'DELETE', headers: { 'Authorization': `Bearer ${token}` } });
            if (res.ok) document.getElementById(`project-card-${id}`).remove();
        }
    }

    document.getElementById('createProjectForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const res = await fetch('/projects/', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
            body: JSON.stringify({ title: document.getElementById('new_title').value, description: document.getElementById('new_desc').value })
        });
        if (res.ok) location.reload();
    });
        
    document.getElementById('btnLogout').addEventListener('click', (e) => {
        e.preventDefault();
        
        localStorage.removeItem("access_token");
        
        window.location.href = "/login";
    });

    if (token) {
        document.getElementById('btnLogout').style.display = 'block';
    }
    
    document.addEventListener("DOMContentLoaded", function() {
            loadUserProfile();  // Carga los datos del estudiante 
            loadProjects();     // Carga las tarjetas de los proyectos
        });

</script>
{% endblock %}
