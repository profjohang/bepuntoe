{% extends "base.html" %}

{% block content %}
<div class="row mb-4 align-items-center">
    <div class="col">
        <h2 class="fw-bold text-dark">Mis Proyectos</h2>
        <p class="text-muted">Gestiona tus ideas de emprendimiento</p>
    </div>
    <div class="col-auto">
        <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#createProjectModal">
            + Nuevo Proyecto
        </button>
    </div>
</div>

<div class="row" id="projects-container">
    <div class="col-12 text-center mt-5">
        <div class="spinner-border text-primary" role="status"></div>
        <p>Cargando tus proyectos...</p>
    </div>
</div>

<div class="modal fade" id="createProjectModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">Comenzar una nueva idea</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <form id="createProjectForm">
                    <div class="mb-3">
                        <label class="form-label">Nombre del Proyecto</label>
                        <input type="text" class="form-control" id="new_title" required placeholder="Ej: Venta de Postres Saludables">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Breve Descripción</label>
                        <textarea class="form-control" id="new_desc" rows="3" required placeholder="¿De qué trata tu idea?"></textarea>
                    </div>
                    <button type="submit" class="btn btn-primary w-100">Crear Proyecto</button>
                </form>
            </div>
        </div>
    </div>
</div>

<script>
    const token = localStorage.getItem("access_token");

    if (!token) {
        window.location.href = "/login";
    }

    async function loadProjects() {
        try {
            const response = await fetch('/projects/', { 
                headers: { 'Authorization': `Bearer ${token}` }
            });

            if (response.status === 401) {
                localStorage.removeItem("access_token");
                window.location.href = "/login";
                return;
            }

            const projects = await response.json();
            
            // Ahora este ID sí existe en el HTML de arriba
            const container = document.getElementById('projects-container');
            container.innerHTML = ''; 

            if (projects.length === 0) {
                container.innerHTML = `<div class="col-12 text-center py-5"><h5 class="text-muted">Aún no tienes proyectos.</h5></div>`;
                return;
            }

            projects.forEach(p => {
                const html = `
                <div class="col-md-4 mb-4">
                    <div class="card h-100 shadow-sm border-0 project-card">
                        <div class="card-body">
                            <h5 class="card-title fw-bold text-dark">${p.title}</h5>
                            <p class="card-text text-muted small">${p.description}</p>
                            <div class="mt-3">
                                <a href="/project/view/${p.id}" class="btn btn-outline-primary w-100">Abrir Proyecto</a>
                            </div>
                        </div>
                    </div>
                </div>`;
                container.innerHTML += html;
            });

        } catch (error) {
            console.error("Error cargando proyectos:", error);
        }
    }

    document.getElementById('createProjectForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const title = document.getElementById('new_title').value;
    const desc = document.getElementById('new_desc').value;

    try {
        const response = await fetch('/projects/', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'Authorization': `Bearer ${token}`
            },
            body: JSON.stringify({ title: title, description: desc })
        });

        if (response.ok) {
            // Buscamos el modal por su ID correcto
            const modalElement = document.getElementById('createProjectModal');
            
            // Intentamos obtener la instancia activa o creamos una nueva para poder cerrarlo
            const modal = bootstrap.Modal.getInstance(modalElement) || new bootstrap.Modal(modalElement);
            
            modal.hide(); // Cerramos la ventana
            loadProjects(); // Recargamos la lista de proyectos
            document.getElementById('createProjectForm').reset(); // Limpiamos los campos
        } else {
            alert("Error al crear. Tu sesión podría haber expirado.");
        }
    } catch (error) {
        console.error("Error en la petición:", error);
    }
});    

    loadProjects();
</script>
{% endblock %}
