{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center my-5">
    <div class="col-sm-10 col-md-8 col-lg-5 col-xl-4">
        
        <div class="text-center mb-4">
            <img src="/static/images/logo.png" alt="b.e logo" style="width: 100px; height: auto;">
            <p class="text-muted">Emprendimiento y Design Thinking</p>
        </div>

        <div class="card shadow-lg border-0">
            <div class="card-body p-3">
                <h4 class="text-center mb-4 fw-bold">Crear Cuenta</h4>
                
                <form id="registerForm">
                    <div class="mb-3">
                        <label for="username" class="form-label fw-semibold">Nombre de usuario</label>
                        <input type="text" class="form-control" id="username" name="username" required placeholder="Ej: juan_p">
                    </div>

                    <div class="mb-3">
                        <label for="full_name" class="form-label fw-semibold">Nombre y Apellido</label>
                        <input type="text" class="form-control" id="full_name" name="full_name" required placeholder="Ej: Juan Pérez">
                    </div>

                    <div class="mb-3">
                        <label for="birth_date" class="form-label fw-semibold">Fecha de Nacimiento</label>
                        <input type="date" class="form-control" id="birth_date" name="birth_date"
                            required 
                            max="{{ max_date }}" 
                            min="{{ min_date }}">
                        <small class="text-muted d-block">Debes tener entre 10 y 25 años</small>
                    </div>

                    <div class="mb-3">
                        <label for="grade" class="form-label fw-semibold">Grado</label>
                        <input type="text" class="form-control" id="grade" name="grade" required placeholder="Ej: 10° A">
                    </div>

                    <div class="mb-3">
                        <label for="school" class="form-label fw-semibold">Colegio</label>
                        <input type="text" class="form-control" id="school" name="school" required placeholder="Nombre de tu institución">
                    </div>

                    <div class="mb-3">
                        <label for="password" class="form-label fw-semibold">Contraseña</label>
                        <input type="password" class="form-control" id="password" name="password"
                            required 
                            minlength="6" 
                            placeholder="Mínimo 6 caracteres">
                        <small class="text-muted d-block">Debe tener al menos 6 caracteres</small>
                    </div>

                    <button type="submit" class="btn btn-primary w-100 mt-2 shadow-sm">
                        Registrarme ahora
                    </button>
                </form>

                <div id="errorMsg" class="alert alert-danger mt-3" style="display: none;"></div>
                <div id="successMsg" class="alert alert-success mt-3" style="display: none;">
                    ¡Cuenta creada con éxito! Redirigiendo...
                </div>

                <hr class="my-4">
                <div class="text-center">
                    <p class="mb-0">¿Ya tienes cuenta? <a href="/login" class="text-primary fw-bold text-decoration-none">Inicia sesión</a></p>
                </div>
            </div>
        </div>
        <p class="text-center mt-4 text-muted small">© 2026 Proyecto b.e | @johan.guerrerom </p>
    </div>
</div>

<script>
    document.getElementById('registerForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        
        // Captura de todos los campos, incluyendo los nuevos
        const username = document.getElementById('username').value;
        const full_name = document.getElementById('full_name').value;
        const birth_date = document.getElementById('birth_date').value; 
        const school = document.getElementById('school').value;
        const grade = document.getElementById('grade').value;
        const password = document.getElementById('password').value;

        try {
            const response = await fetch('/register', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                // Enviamos el JSON con la estructura que espera schemas.py
                body: JSON.stringify({ 
                    username, 
                    password, 
                    full_name, 
                    birth_date, 
                    school, 
                    grade 
                })
            });

            if (response.ok) {
                document.getElementById('errorMsg').style.display = 'none';
                document.getElementById('successMsg').style.display = 'block';
                setTimeout(() => {
                    window.location.href = '/login';
                }, 2000);
            } else {
                const data = await response.json();
                document.getElementById('errorMsg').innerText = data.detail || "Error al registrar el usuario";
                document.getElementById('errorMsg').style.display = 'block';
                document.getElementById('successMsg').style.display = 'none';
            }
        } catch (error) {
            console.error('Error:', error);
            document.getElementById('errorMsg').innerText = "Error de conexión con el servidor";
            document.getElementById('errorMsg').style.display = 'block';
        }
    });
</script>
{% endblock %}
