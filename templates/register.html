{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-4">
        <div class="card shadow">
            <div class="card-body p-4">
                <h3 class="text-center mb-4">Crear Cuenta</h3>
                <p class="text-center text-muted small">Únete a b.e y empieza a emprender</p>
                
                <form id="registerForm">
                    <div class="mb-3">
                        <label for="username" class="form-label">Elige un nombre de usuario</label>
                        <input type="text" class="form-control" id="username" required placeholder="Ej: johan_teacher">
                    </div>
                    <div class="mb-3">
                        <label for="password" class="form-label">Contraseña</label>
                        <input type="password" class="form-control" id="password" required placeholder="Mínimo 6 caracteres">
                    </div>
                    <button type="submit" class="btn btn-primary w-100">Registrarme</button>
                </form>
                
                <div class="mt-3 text-center">
                    <p>¿Ya tienes cuenta? <a href="/login">Inicia sesión aquí</a></p>
                </div>
                
                <div id="successMsg" class="alert alert-success mt-3" style="display:none;">
                    ¡Cuenta creada! Redirigiendo al login...
                </div>
                <div id="errorMsg" class="alert alert-danger mt-3" style="display:none;"></div>
            </div>
        </div>
    </div>
</div>

<script>
    document.getElementById('registerForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const username = document.getElementById('username').value;
        const password = document.getElementById('password').value;

        try {
            const response = await fetch('/register', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password })
            });

            if (response.ok) {
                document.getElementById('errorMsg').style.display = 'none';
                document.getElementById('successMsg').style.display = 'block';
                // Esperamos 2 segundos para que el usuario vea el mensaje y redirigimos
                setTimeout(() => {
                    window.location.href = '/login';
                }, 2000);
            } else {
                const data = await response.json();
                document.getElementById('errorMsg').innerText = data.detail || "Error al registrar el usuario";
                document.getElementById('errorMsg').style.display = 'block';
            }
        } catch (error) {
            console.error('Error:', error);
        }
    });
</script>
{% endblock %}
