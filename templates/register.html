{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center my-5">
    <div class="col-sm-10 col-md-8 col-lg-5 col-xl-4">
        
        <div class="text-center mb-4">
            <img src="/static/images/logo.png" alt="b.e logo" style="width: 100px; height: auto;">
            <p class="text-muted">Emprendimiento y Design Thinking</p>
        </div>

        <div class="card shadow-lg border-0">
            <div class="card-body p-4">
                <h4 class="text-center mb-4 fw-bold">Crear Cuenta</h4>
                
                <form id="registerForm">
                    <div class="mb-3">
                        <label for="username" class="form-label fw-semibold">Nombre de usuario</label>
                        <input type="text" class="form-control" id="username" required placeholder="Ej: johan_teacher">
                    </div>
                    <div class="mb-3">
                        <label for="password" class="form-label fw-semibold">Contraseña</label>
                        <input type="password" class="form-control" id="password" required placeholder="Mínimo 6 caracteres">
                    </div>
                    <button type="submit" class="btn btn-primary w-100 mt-2 shadow-sm">
                        Registrarme ahora
                    </button>
                </form>
                
                <div class="mt-4 text-center border-top pt-3">
                    <p class="mb-0">¿Ya tienes cuenta?<br>
                        <a href="/login" class="fw-bold text-decoration-none" style="color: var(--be-blue);">Inicia sesión aquí</a>
                    </p>
                </div>
                
                <div id="successMsg" class="alert alert-success mt-3" style="display:none; font-size: 0.9rem;">
                    <i class="fas fa-check-circle me-2"></i> ¡Cuenta creada! Redirigiendo al login...
                </div>
                <div id="errorMsg" class="alert alert-danger mt-3" style="display:none; font-size: 0.9rem;"></div>
            </div>
        </div>
        
        <p class="text-center mt-4 text-muted small">© 2026 Proyecto b.e | @johan.guerrerom </p>
    </div>
</div>

<script>
    document.getElementById('registerForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const username = document.getElementById('username').value;
        const password = document.getElementById('password').value;

        try {
            const response = await fetch('/register', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password })
            });

            if (response.ok) {
                document.getElementById('errorMsg').style.display = 'none';
                document.getElementById('successMsg').style.display = 'block';
                setTimeout(() => {
                    window.location.href = '/login';
                }, 2000);
            } else {
                const data = await response.json();
                document.getElementById('errorMsg').innerText = data.detail || "Error al registrar el usuario";
                document.getElementById('errorMsg').style.display = 'block';
                document.getElementById('successMsg').style.display = 'none';
            }
        } catch (error) {
            console.error('Error:', error);
            document.getElementById('errorMsg').innerText = "Error de conexión con el servidor";
            document.getElementById('errorMsg').style.display = 'block';
        }
    });
</script>
{% endblock %}
